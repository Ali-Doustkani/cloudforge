name: Infra Stack App
run-name: ${{ github.sha }}
on:
  workflow_dispatch:
permissions:
  actions: write
  id-token: write
jobs:
  deploy-stg:
    runs-on: ubuntu-latest
    environment: stg
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: infra/app
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/infra-setup
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/terraform-plan
        with:
          working-directory: infra/app
          backend-key: app-stg.tfstate
          plan-vars: -var="ver=${{ github.sha }}" -var="environment=stg" -var="github_sp_client_id=${{ secrets.AZURE_CLIENT_ID }}"
      - run: terraform apply -auto-approve tfplan
      - name: Prepare test environment
        id: prepare_test_env
        run: |
          acr_name=$(terraform output -raw acr_name)
          app_name=$(terraform output -raw app_service_name)
          kv_name=$(terraform output -raw key_vault_name)
          config_name=$(terraform output -raw app_config_name)

          az acr repository show-tags --name $acr_name --repository testapp --query "[?@=='testversion']" -o tsv | grep -q . \
            || az acr import --name $acr_name --source ghcr.io/ali-doustkani/testapp:latest --image testapp:testversion

          az webapp restart --name $app_name --resource-group rg-cloudforge-stg

          for i in {1..5}; do
            echo "Attempt $i: setting app config key"
            if az appconfig kv set --name $config_name --key infra_default --value infra_value --yes; then break; fi
            sleep 10
          done

          for i in {1..5}; do
            echo "Attempt $i: setting secret in $kv_name"
            if az keyvault secret set --name infra-default --value infra_value --vault-name "$kv_name"; then break; fi
            sleep 10
          done

          echo "url=https://$app_name.azurewebsites.net" >> $GITHUB_OUTPUT
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
      - name: Test
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest ./infra/tests/tests.py --url ${{ steps.prepare_test_env.outputs.url }} --reruns 5 --reruns-delay 3

  plan-prod:
    needs: deploy-stg
    runs-on: ubuntu-latest
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: infra/app
    outputs:
      has_deletions: ${{ steps.terraform-plan.outputs.has_deletions }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/infra-setup
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/terraform-plan
        id: terraform-plan
        with:
          working-directory: infra/app
          backend-key: app-prod.tfstate
          plan-vars: -var="ver=${{ github.sha }}" -var="environment=prod" -var="github_sp_client_id=${{ secrets.AZURE_CLIENT_ID }}"
          lint: 'false'
          test: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/app/tfplan

  approve-deletions-prod:
    needs: plan-prod
    if: needs.plan-prod.outputs.has_deletions == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - run: echo "Deletion approval granted for prod deployment"

  apply-prod:
    needs: [plan-prod, approve-deletions-prod]
    if: always() && needs.plan-prod.result == 'success' && (needs.approve-deletions-prod.result == 'success' || needs.approve-deletions-prod.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: infra/app
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/infra-setup
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: terraform init -backend-config=../bootstrap/backend.hcl -backend-config="key=app-prod.tfstate"
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra/app
      - run: terraform apply -auto-approve tfplan
