name: app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/static/**'
    
jobs:
  deploy-static:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az storage blob upload-batch --account-name stcloudforgestatus --source src/static/ --destination '$web' --overwrite --auth-mode login
