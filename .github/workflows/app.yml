name: App
run-name: ${{ github.sha }}
on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  deploy-stg:
    runs-on: ubuntu-latest
    environment: stg
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: hashicorp/setup-terraform@v3
      - name: Find Terraform Backend
        run: |
          storageAccountName=$(az storage account list --resource-group rg-bootstrap --query "[?tags.type=='terraform-backend'].name" -o tsv)
          echo "storageAccountName=$storageAccountName" >> $GITHUB_ENV
          echo "storageAccountName=$storageAccountName"
      - name: Terraform Init
        run: terraform -chdir=infra/app init -backend-config="storage_account_name=$storageAccountName" -backend-config="key=app-stg.tfstate"
      - name: Get Infrastructure Outputs
        run: |
          acrName=$(terraform -chdir=infra/app output -raw acr_name)
          acrLoginServer=$(az acr show --name $acrName --query loginServer -o tsv)
          webAppName=$(terraform -chdir=infra/app output -raw app_service_name)
          appResourceGroup=$(az webapp list --query "[?name=='$webAppName'].resourceGroup" -o tsv)
          echo "acrName=$acrName" >> $GITHUB_ENV
          echo "acrLoginServer=$acrLoginServer" >> $GITHUB_ENV
          echo "webAppName=$webAppName" >> $GITHUB_ENV
          echo "appResourceGroup=$appResourceGroup" >> $GITHUB_ENV
          echo "acrName=$acrName acrLoginServer=$acrLoginServer webAppName=$webAppName appResourceGroup=$appResourceGroup"
      - name: ACR Login
        run: az acr login --name ${{ env.acrName }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: |
            ${{ env.acrLoginServer }}/app:latest
            ${{ env.acrLoginServer }}/app:${{ github.sha }}
      - name: Upgrade App Service
        run: az webapp config container set --resource-group $appResourceGroup --name $webAppName --container-image-name $acrLoginServer/app:${{ github.sha }}

  deploy-prod:
    needs: deploy-stg
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: hashicorp/setup-terraform@v3
      - name: Find Terraform Backend
        run: |
          storageAccountName=$(az storage account list --resource-group rg-bootstrap --query "[?tags.type=='terraform-backend'].name" -o tsv)
          echo "storageAccountName=$storageAccountName" >> $GITHUB_ENV
          echo "storageAccountName=$storageAccountName"
      - name: Terraform Init
        run: terraform -chdir=infra/app init -backend-config="storage_account_name=$storageAccountName" -backend-config="key=app-prod.tfstate"
      - name: Get Infrastructure Outputs
        run: |
          acrLoginServer=$(az acr show --name $(terraform -chdir=infra/app output -raw acr_name) --query loginServer -o tsv)
          webAppName=$(terraform -chdir=infra/app output -raw app_service_name)
          appResourceGroup=$(az webapp list --query "[?name=='$webAppName'].resourceGroup" -o tsv)
          echo "acrLoginServer=$acrLoginServer" >> $GITHUB_ENV
          echo "webAppName=$webAppName" >> $GITHUB_ENV
          echo "appResourceGroup=$appResourceGroup" >> $GITHUB_ENV
          echo "acrLoginServer=$acrLoginServer webAppName=$webAppName appResourceGroup=$appResourceGroup"
      - name: Upgrade App Service
        run: az webapp config container set --resource-group $appResourceGroup --name $webAppName --container-image-name $acrLoginServer/app:${{ github.sha }}
