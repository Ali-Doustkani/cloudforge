name: App
run-name: ${{ github.sha }}
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: stg
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
      - name: Find Terraform Backend
        run: |
          storageAccountName=$(az storage account list --resource-group rg-bootstrap --query "[?tags.type=='terraform-backend'].name" -o tsv)
          echo "storageAccountName=$storageAccountName" >> $GITHUB_ENV
          echo "storageAccountName=$storageAccountName"
      - name: Terraform Init
        run: terraform -chdir=infra/app init -backend-config="storage_account_name=$storageAccountName" -backend-config="key=app-stg.tfstate"
      - name: Get ACR Details
        run: |
          acrName=$(terraform -chdir=infra/app output -raw acr_name)
          acrLoginServer=$(az acr show --name $acrName --query loginServer -o tsv)
          echo "acrName=$acrName" >> $GITHUB_ENV
          echo "acrLoginServer=$acrLoginServer" >> $GITHUB_ENV
          echo "acrName=$acrName acrLoginServer=$acrLoginServer"
      - name: ACR Login
        run: az acr login --name ${{ env.acrName }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: |
            ${{ env.acrLoginServer }}/app:latest
            ${{ env.acrLoginServer }}/app:${{ github.sha }}

  deploy-stg:
    needs: build
    uses: ./.github/workflows/deploy-app.yml
    with:
      environment: stg
      tfstate_key: app-stg.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-prod:
    needs: deploy-stg
    uses: ./.github/workflows/deploy-app.yml
    with:
      environment: prod
      tfstate_key: app-prod.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
