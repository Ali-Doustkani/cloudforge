name: Infra Stack Platform

run-name: ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  actions: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: infra/platform
    steps:
      - uses: ./.github/actions/infra-setup
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: terraform init -backend-config=../bootstrap/backend.hcl
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init --config ../.tflint.hcl
      - run: tflint --config ../.tflint.hcl --force
      - run: terraform validate
      - run: terraform test
        working-directory: infra/platform
      - run: terraform plan -var="ver=${{ github.sha }}" -out=tfplan
      - name: Warn on deletions
        run: |
          deletes=$(terraform show -json tfplan | jq '[.resource_changes[]? | select(.change.actions[] == "delete")] | length')
          if [ "$deletes" -gt 0 ]; then
            echo "::warning::Terraform plan contains $deletes resource deletion(s). Review before merging."
          else
            echo "::notice::No resource deletions in this plan."
          fi
      - run: terraform apply -auto-approve tfplan
        if: github.ref == 'refs/heads/main'