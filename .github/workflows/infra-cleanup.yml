name: Infra Cleanup
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Remove All Resources
        run: |
          for rg in $(az group list --query "[].name" -o tsv); do
              echo "Deleting resource group: $rg"
              az group delete --name "$rg" --yes
          done
      - name: Purge Soft-Deleted Key Vaults
        run: |
          az keyvault list-deleted --resource-type vault \
            --query "[].name" -o tsv | while read -r name; do
              echo "Purging soft-deleted Key Vault: $name"
              az keyvault purge --name "$name" || true
            done