name: Infra Cleanup
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Remove All Resources
        run: |
          for rg in $(az group list --query "[].name" -o tsv); do
              echo "Deleting resource group: $rg"
              az group delete --name "$rg" --yes
          done