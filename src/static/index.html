<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>CloudForge Status</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
        }

        h1 {
            font-size: 1.4rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 0.5rem;
            border-bottom: 1px solid #ddd;
        }

        .healthy {
            color: green;
        }

        .degraded {
            color: orange;
        }

        .down {
            color: red;
        }
    </style>
</head>
<body>
<h1>CloudForge Status</h1>
<p id="updated"></p>
<table>
    <thead>
    <tr>
        <th>Service</th>
        <th>Status</th>
        <th>Last checked</th>
    </tr>
    </thead>
    <tbody id="services"></tbody>
</table>
<script>
    fetch('status.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('updated').textContent = 'Updated: ' + data.updated
            const tbody = document.getElementById('services')
            data.services.forEach(s => {
                const tr = document.createElement('tr')
                tr.innerHTML = `<td>${s.name}</td><td class="${s.status}">${s.status}</td><td>${s.last_checked}</td>`
                tbody.appendChild(tr)
            })
        })
</script>
</body>
</html>
